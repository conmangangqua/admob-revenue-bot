name: 🔄 Keep Alive (Prevent Schedule Disable)

on:
  # Chạy mỗi tháng 2 lần để GitHub không disable schedule
  schedule:
    - cron: '0 0 1,15 * *'

  workflow_dispatch:

jobs:
  keep-alive:
    name: Re-enable Scheduled Workflows
    runs-on: ubuntu-latest
    permissions:
      actions: write

    steps:
      - name: 🔄 Re-enable daily-revenue-report nếu bị disable
        run: |
          WORKFLOW_ID=$(curl -s \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows" \
            | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          for w in data.get('workflows', []):
              if 'daily-revenue-report' in w['path']:
                  print(w['id'])
                  break
          ")

          if [ -n "$WORKFLOW_ID" ]; then
            echo "🔓 Enabling workflow ID: $WORKFLOW_ID"
            curl -s -X PUT \
              -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
              -H "Accept: application/vnd.github.v3+json" \
              "https://api.github.com/repos/${{ github.repository }}/actions/workflows/$WORKFLOW_ID/enable"
            echo "✅ Done."
          else
            echo "ℹ️ Workflow not found or already active."
          fi
