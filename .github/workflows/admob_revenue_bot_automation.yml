name: AdMob Revenue Bot Automation 🚀

on:
  schedule:
    # Chạy tự động vào 00:00 UTC (khoảng 07:00 AM giờ VN) hàng ngày
    - cron: '0 0 * * *'
  workflow_dispatch:
    # Cho phép Sếp kích nổ bằng tay bất cứ lúc nào

permissions:
  contents: write

jobs:
  collect-revenue:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 📦 Install Dependencies
        run: |
          pip install -r requirements.txt

      - name: 🤖 Execute Bot - Collect Data
        env:
          ADMOB_CLIENT_ID: ${{ secrets.ADMOB_CLIENT_ID }}
          ADMOB_CLIENT_SECRET: ${{ secrets.ADMOB_CLIENT_SECRET }}
          ADMOB_REFRESH_TOKEN: ${{ secrets.ADMOB_REFRESH_TOKEN }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          DB_TYPE: 'S3_MOCK' # Hoặc 'FIREBASE' tùy Sếp cấu hình thêm
        run: |
          # Chạy script main để bốc số ngày mới nhất
          export PYTHONPATH=$PYTHONPATH:.
          python3 scripts/main.py

      - name: 💾 Commit & Push Updated Data
        run: |
          git config --local user.email "bot@antigravity.hub"
          git config --local user.name "Antigravity Automation Bot"
          git add data/revenue_history.json
          git commit -m "chore: auto-update revenue history [skip ci]" || echo "No changes to commit"
          git push
