<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📱 AdMob Revenue Intelligence</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --color-bg: #F0F4F8;
            --color-card: #FFFFFF;
            --color-text: #0F172A;
            --color-text-muted: #64748b;
            --color-border: #E2E8F0;
            --color-accent: #3B82F6;
            --color-success: #10B981;
            --color-success-bg: #D1FAE5;
            --color-danger: #EF4444;
            --color-danger-bg: #FEE2E2;

            --hero-bg: linear-gradient(135deg, #1E3A8A 0%, #3B82F6 100%);
            --hero-text: #FFFFFF;

            --shadow-soft: 0 4px 20px rgba(0, 0, 0, 0.04);
            --shadow-hover: 0 10px 25px rgba(0, 0, 0, 0.08);
            --radius-lg: 16px;
            --radius-md: 12px;

            font-family: 'Inter', sans-serif;
            font-variant-numeric: tabular-nums;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html { font-size: 24px; }

        body {
            background-color: var(--color-bg);
            color: var(--color-text);
            min-height: 100vh;
            padding: 1.5rem;
            line-height: 1.5;
        }

        .container {
            width: 100%;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.75rem 0;
            margin-bottom: 1rem;
            flex-wrap: wrap;
            gap: 1rem;
            border-bottom: 1px solid var(--color-border);
        }

        .header-title {
            display: flex;
            align-items: center;
            gap: 0.6rem;
        }

        h1 {
            font-size: 1.35rem;
            font-weight: 800;
            color: var(--color-text);
            letter-spacing: -0.02em;
        }

        .status-badge {
            font-size: 0.7rem;
            color: #047857;
            background: #A7F3D0;
            padding: 0.2rem 0.55rem;
            border-radius: 999px;
            font-weight: 700;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%   { box-shadow: 0 0 0 0 rgba(167,243,208,0.7); }
            70%  { box-shadow: 0 0 0 6px rgba(167,243,208,0); }
            100% { box-shadow: 0 0 0 0 rgba(167,243,208,0); }
        }

        .controls {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        select {
            padding: 0.45rem 0.85rem;
            border-radius: var(--radius-md);
            border: 1px solid var(--color-border);
            background: var(--color-card);
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            font-size: 0.85rem;
            color: var(--color-text);
            cursor: pointer;
            outline: none;
            transition: border-color 0.2s;
        }

        select:hover { border-color: var(--color-accent); }

        .filter-group {
            display: flex;
            background: var(--color-card);
            border: 1px solid var(--color-border);
            border-radius: 10px;
            overflow: hidden;
        }

        .filter-group select {
            border: none;
            border-right: 1px solid var(--color-border);
            border-radius: 0;
            background: transparent;
            padding: 0.45rem 0.75rem;
            box-shadow: none;
        }

        .filter-group select:last-child { border-right: none; }
        .filter-group select:hover { background: rgba(59,130,246,0.05); }

        .upload-zone {
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }

        .btn-upload {
            background: var(--color-card);
            border: 1px solid var(--color-border);
            padding: 0.45rem 0.8rem;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            color: var(--color-text);
            font-size: 0.82rem;
            transition: 0.2s;
        }

        .btn-upload:hover { border-color: var(--color-accent); background: rgba(59,130,246,0.05); }

        .btn-upload-confirm {
            background: var(--color-accent);
            border: none;
            padding: 0.45rem 0.9rem;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 700;
            color: white;
            font-size: 0.82rem;
            transition: 0.2s;
        }

        /* Joke Box */
        .ai-joke-box {
            background: rgba(139,92,246,0.07);
            border: 1px solid rgba(139,92,246,0.2);
            border-radius: 10px;
            padding: 0.6rem 1rem;
            margin-bottom: 1.25rem;
            display: flex;
            align-items: center;
            gap: 0.6rem;
            animation: fadeIn 0.4s ease;
        }

        .ai-joke-text {
            color: #6D28D9;
            font-weight: 600;
            font-size: 0.88rem;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-4px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* Summary Grid */
        .summary-grid {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 1.5rem;
            margin-bottom: 2rem;
            align-items: stretch;
        }

        @media (max-width: 900px) {
            .summary-grid {
                grid-template-columns: 1fr;
            }
        }

        .stat-card {
            background: var(--color-card);
            padding: 1.5rem;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-soft);
            transition: transform 0.2s, box-shadow 0.2s;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .stat-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-hover);
        }

        /* Hero Card Easter Egg Clickable styling */
        .stat-card.hero {
            background: var(--hero-bg);
            color: var(--hero-text);
            box-shadow: 0 10px 25px rgba(59, 130, 246, 0.3);
            cursor: pointer;
            user-select: none;
        }

        .stat-card.hero:hover {
            transform: scale(1.02);
        }

        .stat-card.hero .stat-label {
            color: rgba(255, 255, 255, 0.9);
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.1);
        }

        .stat-card.hero .stat-value {
            color: #FFFFFF;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.1);
        }

        .stat-card.hero .trend-badge.positive {
            background: rgba(16, 185, 129, 0.25);
            color: #FFFFFF;
        }

        .stat-card.hero .trend-badge.negative {
            background: rgba(239, 68, 68, 0.3);
            color: #FFFFFF;
        }

        .stat-card.hero .trend-text {
            color: rgba(255, 255, 255, 0.85);
            text-shadow: 0 1px 1px rgba(0, 0, 0, 0.1);
        }

        .converter-box {
            margin-top: 0.5rem;
            padding: 0.3rem 0.6rem;
            border-radius: 6px;
            background: rgba(255, 255, 255, 0.15);
            display: inline-block;
            font-size: 0.8rem;
            font-weight: 500;
            color: #FFFFFF;
            letter-spacing: 0.02em;
            animation: pulse 3s infinite;
        }

        .stat-header {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 0.75rem;
        }

        .stat-icon {
            font-size: 1.25rem;
        }

        .stat-label {
            color: var(--color-text-muted);
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .stat-value {
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
            margin-bottom: 0.5rem;
        }

        .stat-value .usd {
            font-size: 2.2rem;
            font-weight: 800;
            color: var(--color-text);
            line-height: 1;
            letter-spacing: -0.04em;
        }

        /* .stat-value .vnd removed to avoid double currency display */
        .stat-card.hero .stat-value .usd {
            color: #FFFFFF;
            font-size: 2.5rem;
        }

        .trend-wrap {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-top: 0.75rem;
        }

        .trend-badge {
            font-size: 0.75rem;
            font-weight: 700;
            padding: 0.25rem 0.5rem;
            border-radius: 6px;
        }

        .trend-badge.positive {
            background: var(--color-success-bg);
            color: var(--color-success);
        }

        .trend-badge.negative {
            background: var(--color-danger-bg);
            color: var(--color-danger);
        }

        .trend-badge.neutral {
            background: #F1F5F9;
            color: #64748b;
        }

        .trend-text {
            font-size: 0.75rem;
            color: var(--color-text-muted);
            font-weight: 500;
        }

        .top-app-rev-box {
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.08) 0%, rgba(147, 51, 234, 0.08) 100%);
            border-left: 4px solid var(--color-accent);
            padding: 0.75rem 1rem;
            border-radius: 8px;
            margin-top: 0.5rem;
            display: flex;
            flex-direction: column;
            gap: 0.2rem;
        }

        /* Ranking Styles - Horizontal Podium */
        #valTop3List {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
            margin-top: 0.5rem;
        }

        #valTop3List {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 0.75rem;
        }

        .ranking-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            padding: 1rem 0.75rem;
            background: var(--color-bg);
            border-radius: 12px;
            border: 1.5px solid rgba(0,0,0,0.05);
            transition: all 0.18s;
            cursor: pointer;
            min-width: 0;
        }

        .ranking-item:hover {
            background: #FFFFFF;
            transform: translateY(-3px);
            box-shadow: var(--shadow-md);
            border-color: var(--color-accent);
        }

        .ranking-rank {
            font-size: 2rem;
            line-height: 1;
            margin-bottom: 0.4rem;
        }

        .ranking-info {
            width: 100%;
            min-width: 0;
        }

        .ranking-name {
            font-weight: 700;
            font-size: 0.88rem;
            color: var(--color-text);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 0.3rem;
        }

        .ranking-stats {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.2rem;
        }

        /* Charts */
        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
            margin-bottom: 2rem;
            align-items: stretch;
        }

        @media (max-width: 900px) {
            .dashboard-grid {
                grid-template-columns: 1fr;
            }
        }

        .card {
            background: var(--color-card);
            padding: 1.5rem;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-soft);
            display: flex;
            flex-direction: column;
        }

        .card-title {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--color-text);
            margin-bottom: 1.25rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            flex-shrink: 0;
        }

        /* App List Grid */
        .app-list {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 1rem;
        }

        .app-item {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            padding: 1.1rem 1.2rem 1rem;
            border-radius: 16px;
            background: var(--color-bg);
            border: 1.5px solid rgba(0,0,0,0.06);
            transition: transform 0.18s, box-shadow 0.18s;
            cursor: pointer;
            position: relative;
            min-height: 130px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }

        .app-item:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 24px rgba(0,0,0,0.10);
        }

        .app-name-wrap {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .app-dot {
            flex-shrink: 0;
            width: 9px;
            height: 9px;
            border-radius: 50%;
        }

        .app-name {
            font-weight: 600;
            font-size: 0.8rem;
            color: var(--color-text-muted);
            line-height: 1.3;
            opacity: 0.75;
        }

        .app-rev {
            font-weight: 900;
            font-size: 1.6rem;
            color: var(--color-text);
            line-height: 1;
            letter-spacing: -0.5px;
        }

        .app-trend-pill {
            display: inline-flex;
            align-items: center;
            gap: 0.25rem;
            font-size: 0.82rem;
            font-weight: 800;
            padding: 0.25rem 0.65rem;
            border-radius: 999px;
            margin-top: auto;
            width: fit-content;
        }

        /* Modal Popup */
        #detailPanel {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 90%;
            max-width: 450px;
            background: var(--color-card);
            border-radius: var(--radius-lg);
            padding: 1.75rem;
            box-shadow: 0 25px 50px -12px rgba(15, 23, 42, 0.25);
            z-index: 1000;
            display: none;
            border: 1px solid var(--color-border);
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(4px);
            z-index: 999;
            display: none;
        }

        .btn-close {
            background: none;
            border: none;
            color: #64748b;
            font-size: 1.5rem;
            font-weight: bold;
            cursor: pointer;
            float: right;
            margin-top: -0.5rem;
            transition: color 0.2s;
        }

        .btn-close:hover {
            color: var(--color-danger);
        }

        .detail-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.8rem 0;
            border-bottom: 1px solid var(--color-border);
        }

        .detail-row:last-child {
            border-bottom: none;
        }

        .detail-app {
            font-weight: 600;
            color: var(--color-text);
            font-size: 0.95rem;
        }

        .detail-rev {
            color: var(--color-accent);
            font-weight: 700;
            font-size: 1.05rem;
        }
    </style>
</head>

<body>

    <div class="overlay" id="overlay" onclick="closeDetail()"></div>
    <div id="detailPanel">
        <button class="btn-close" onclick="closeDetail()">×</button>
        <h3 id="detailDate"
            style="font-weight: 800; font-size: 1.25rem; margin-bottom: 1.5rem; color: var(--color-text);">Báo cáo Ngày
        </h3>
        <div id="detailList" style="max-height: 400px; overflow-y: auto; padding-right: 0.5rem;"></div>
    </div>

    <div class="container">
        <header>
            <div class="header-title">
                <h1>🚀 AdMob Dashboard</h1>
                <div class="status-badge">LIVE</div>
            </div>
            <div class="controls">
                <span id="lastUpdated" style="font-size:0.78rem;color:var(--color-text-muted);font-weight:500;">⏳ Syncing...</span>

                <div class="filter-group">
                    <select id="appFilter" onchange="applyFilter()">
                        <option value="all">Tất cả</option>
                        <optgroup label="Đối tác">
                            <option value="partner:azura">Azura</option>
                            <option value="partner:bbl">BBL</option>
                            <option value="partner:herond">Herond</option>
                            <option value="partner:affica">Affica</option>
                        </optgroup>
                        <optgroup label="App" id="appOptGroup">
                        <!-- Injected via JS -->
                        </optgroup>
                    </select>
                    <select id="timeFilter" onchange="applyFilter()">
                        <option value="today">Hôm nay</option>
                        <option value="yesterday">Hôm qua</option>
                        <option value="7days" selected>7 Ngày</option>
                        <option value="30days">30 Ngày</option>
                        <option value="thismonth">Tháng này</option>
                    </select>
                    <select id="currencyFilter" onchange="setCurrency(this.value)">
                        <option value="VND" selected>VND</option>
                        <option value="USD">USD</option>
                    </select>
                </div>

                <!-- Upload CSV -->
                <div class="upload-zone">
                    <input type="file" id="csvFileInput" accept=".csv" style="display:none;" onchange="handleFileSelect(event)">
                    <button onclick="document.getElementById('csvFileInput').click()" class="btn-upload">📁 Azura.csv</button>
                    <button id="uploadBtn" onclick="uploadCsv()" class="btn-upload-confirm" style="display:none;">🚀 Upload</button>
                    <span id="uploadStatus" style="font-size:0.8rem;font-weight:600;color:var(--color-accent);display:none;"></span>
                </div>
            </div>
        </header>

        <div class="ai-joke-box" id="aiJokeBox" style="display: none;">
            <span style="font-size: 1.5rem;">🤖</span>
            <span class="ai-joke-text" id="aiJokeText">Đang phân tích số...</span>
        </div>

        </div><!-- close .container -->
        <div class="summary-grid">
            <!-- Add onclick to Hero Card for Easter Egg -->
            <div class="stat-card hero" id="heroCard" onclick="triggerEasterEgg()">
                <div class="stat-header" style="margin-bottom: 0.25rem;">
                    <span class="stat-icon">💰</span>
                    <span class="stat-label" id="lblHeroRev">Tổng Doanh thu</span>
                    <span
                        style="font-size: 0.6rem; background: rgba(255,255,255,0.2); padding: 2px 6px; border-radius: 4px; margin-left: auto;">Tap
                        here 💸</span>
                </div>
                <div id="heroDateRange"
                    style="font-size: 1.15rem; font-weight: 700; color: rgba(255,255,255,0.9); margin-bottom: 0.5rem; letter-spacing: 0.5px;">
                    --</div>
                <div class="stat-value" id="valHeroRev">--</div>
                <div class="trend-wrap">
                    <span class="trend-badge" id="trendHeroBadge">--</span>
                    <span class="trend-text" id="trendHeroText">so với kỳ trước</span>
                </div>
                <div id="converterBox" style="display:none;"></div>
            </div>

            <div class="stat-card" style="padding-bottom: 0.5rem;">
                <div class="stat-header" style="margin-bottom: 0.75rem;">
                    <span class="stat-icon">🏆</span>
                    <span class="stat-label">Top App Thần Tài</span>
                    <span
                        style="font-size: 0.7rem; color: var(--color-text-muted); margin-left: auto; font-weight: 600;">Ranking
                        1-3</span>
                </div>
                <div id="valTop3List">
                    <!-- Injected via JS -->
                    <div style="padding: 2rem 0; text-align: center; color: var(--color-text-muted); opacity: 0.5;">Đang
                        lọc siêu sao...</div>
                </div>
            </div>
        </div>

    <div class="dashboard-grid">
        <div class="card">
            <div class="card-title">📈 Tổng doanh thu <span
                    style="font-size: 0.8rem; font-weight: 500; color: var(--color-text-muted); background: var(--color-bg); padding: 0.2rem 0.5rem; border-radius: 4px; margin-left: auto;">Chạm
                    vào biểu đồ để xem chi tiết</span></div>
            <div style="flex: 1; min-height: 350px; width: 100%; position: relative;">
                <canvas id="revenueLineChart"></canvas>
            </div>
        </div>

        <div class="card" style="padding-bottom: 2rem;">
            <div class="card-title">📈 Lãi thực MKT (VND)</div>
            <div style="flex: 1; min-height: 350px; width: 100%; position: relative;">
                <canvas id="profitLineChart"></canvas>
            </div>
        </div>
    </div>

    <div class="card" style="margin-bottom: 2rem;">
        <div class="card-title">💎 Doanh thu chi tiết từng App</div>
        <div class="app-list" id="appListUI"></div>
    </div>
    </div>

    <script>
        let historyData = {};
        let sortedDates = [];
        let curDates = []; // Biến toàn cục lưu danh sách ngày đang lọc
        let appAgg = {}, profitAgg = {}, prevAppAgg = {}, prevProfitAppAgg = {};
        let allApps = new Set();
        let currentVndRate = 25400; // Tỷ giá dự phòng
        let clickCount = 0;
        let currentCurrency = 'VND'; // Mặc định hiển thị VND

        Chart.register(ChartDataLabels);

        let lineChartObj = null;
        let profitLineChartObj = null;

        Chart.defaults.font.family = "'Inter', sans-serif";
        Chart.defaults.color = '#64748b';
        const COLORS = ['#3B82F6', '#8B5CF6', '#10B981', '#F59E0B', '#EF4444', '#EC4899', '#14B8A6', '#6366F1'];

        const POSITIVE_QUOTES = [
            "Sếp đi sắm ngay chiếc Mẹc đi, để em code phần còn lại cho! 🚗💨",
            "Tuyệt trần! Trend xanh mướt thế này tối nay anh em đi nhậu Buffet Sếp nhỉ? 🥂",
            "Tiền về như lốc! Gửi Bank lấy lãi kép thôi Sếp! 💸",
            "Nhìn số nhảy sướng con mắt, mai cho em xin nghỉ phép 1 hôm đi shopping nhé! 🛍️"
        ];
        const NEGATIVE_QUOTES = [
            "Tụt tí thôi, phong độ là nhất thời. Hít thở sâu vào Sếp đừng giận em! 🧘‍♂️",
            "Tiền ngoài trạm thu phí còn tắc cơ mà, mai rồi cá lại về lưới Sếp ạ! 🚦",
            "Thôi đừng căng thẳng Sếp ơi! Làm cốc Trà đá 3k hút thuốc lào cho tỉnh nhé 🍵",
            "Đồ thị biểu diễn nhịp tim đấy Sếp, lúc lên lúc xuống mới khỏe! 💓"
        ];
        const FUNNY_CONVERSIONS = [
            { label: "Bát Phở Thìn bò lăn 🍜", price: 70000 },
            { label: "Tháng Netflix Premium 🍿", price: 260000 },

        function formatSheetVal(val) {
            if (val === undefined || val === null || val === '') return '--';
            let num = parseFloat(val.toString().replace(/,/g, ''));
            if (isNaN(num)) return val;

            // Nếu là 0, hiện nhãn Chưa cập nhật cho chuyên nghiệp
            if (num === 0) return '<span style="font-weight:400; font-size:0.75rem; color:var(--color-text-muted); opacity:0.6;">Chưa cập nhật</span>';

            // Nếu là số nhỏ (triệu), thêm chữ Tr
            if (Math.abs(num) < 1000) return num.toLocaleString('vi-VN') + ' Tr';
            return num.toLocaleString('vi-VN');
        }

        function getFunnyConverterText(usdValue, vndMillionOverride) {
            const vnd = (vndMillionOverride != null)
                ? vndMillionOverride * 1_000_000
                : usdValue * currentVndRate;
            if (vnd <= 0) return "";
            const mtb = FUNNY_CONVERSIONS[Math.floor(Math.random() * FUNNY_CONVERSIONS.length)];
            const qty = Math.floor(vnd / mtb.price);
            if (qty < 1) return `Mua được vài ly Trà Đá 🍵`;
            return `Tương đương: ~${qty.toLocaleString('vi-VN')} ${mtb.label}`;
        }

        function formatVNDate(dateStr) {
            if (!dateStr) return '';
            const [y, m, d] = dateStr.split('-');
            return `${d}/${m}`;
        }

        function formatVnd(usdValue, compact = true) {
            const vnd = usdValue * currentVndRate;
            if (compact) {
                if (vnd >= 1000000000) {
                    return `${(vnd / 1000000000).toLocaleString('vi-VN', { maximumFractionDigits: 1 })} Tỷ`;
                }
                if (vnd >= 1000000) {
                    return `${(vnd / 1000000).toLocaleString('vi-VN', { maximumFractionDigits: 1 })} Tr`;
                }
            }
            return `${Math.round(vnd).toLocaleString('vi-VN')} đ`;
        }

        function formatAmount(usdValue, compact = true) {
            if (currentCurrency === 'VND') return formatVnd(usdValue, compact);
            return '$' + usdValue.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        }

        function setCurrency(val) {
            currentCurrency = val;
            applyFilter();
        }

        const PARTNER_MAP = {
            'Quicksave':      'bbl',
            'Aura-Recover':   'bbl',
            'Herond Snapvid': 'herond',
            'LunaAi-Chat':    'affica',
        };

        function getPartner(name) {
            if (PARTNER_MAP[name]) return PARTNER_MAP[name];
            if (/^B\d+/.test(name)) return 'azura';
            return 'unknown';
        }

        function getAppTrend(appName) {
            const recent = curDates.slice(0, 7);
            if (recent.length < 3) return null;

            const vals = recent.map(d => {
                const a = (historyData[d]?.apps || []).find(x => x.name === appName);
                if (!a) return null;
                if (a.sheet_data?.marketing_profit_vnd) {
                    const v = parseFloat(a.sheet_data.marketing_profit_vnd.toString().replace(/,/g, ''));
                    if (!isNaN(v)) return v;
                }
                return null;
            }).filter(v => v !== null);

            if (vals.length < 3) return null;

            vals.reverse(); // oldest → newest

            const n = vals.length;
            const mean = vals.reduce((s, v) => s + v, 0) / n;

            // SLOPE
            const xs = vals.map((_, i) => i + 1);
            const xMean = (n + 1) / 2;
            const slope = vals.reduce((s, v, i) => s + (xs[i] - xMean) * (v - mean), 0)
                        / xs.reduce((s, x) => s + (x - xMean) ** 2, 0);

            // CV = STDEV / |MEAN| — đo mức biến động
            const stdev = Math.sqrt(vals.reduce((s, v) => s + (v - mean) ** 2, 0) / n);
            const cv = mean !== 0 ? stdev / Math.abs(mean) : Infinity;

            const profitDays = vals.filter(v => v > 0).length;
            const lossDays   = vals.filter(v => v < 0).length;
            const lossRatio  = lossDays / n;
            const totalSum   = vals.reduce((s, v) => s + v, 0);

            // Lỗ sấp mặt: tổng âm + >60% ngày lỗ
            if (totalSum < 0 && lossRatio > 0.6)
                return { label: '💀 Lỗ sấp mặt',  color: '#ef4444', bg: 'rgba(239,68,68,0.10)',  border: 'rgba(239,68,68,0.35)' };

            // Toàn lãi
            if (lossDays === 0)
                return { label: '✅ Lãi đều',      color: '#10b981', bg: 'rgba(16,185,129,0.08)', border: 'rgba(16,185,129,0.3)' };

            // Phập phù: lãi lỗ xen kẽ, không rõ xu hướng
            if (profitDays > 0 && lossDays > 0 && cv > 0.5)
                return { label: '⚡ Phập phù',     color: '#f59e0b', bg: 'rgba(245,158,11,0.08)', border: 'rgba(245,158,11,0.3)' };

            // Đang lỗ nhưng slope dương → về bờ
            if (totalSum < 0 && slope > 0)
                return { label: '🚀 Về bờ',        color: '#34d399', bg: 'rgba(52,211,153,0.08)', border: 'rgba(52,211,153,0.3)' };

            // Đang lãi nhưng slope âm → xa bờ
            if (totalSum > 0 && slope < 0)
                return { label: '⚠️ Xa bờ',        color: '#f97316', bg: 'rgba(249,115,22,0.08)', border: 'rgba(249,115,22,0.3)' };

            return { label: '✅ Lãi đều', color: '#10b981', bg: 'rgba(16,185,129,0.08)', border: 'rgba(16,185,129,0.3)' };
        }

        function isMatchApp(name, appFilter) {
            if (appFilter === 'all') return true;
            if (appFilter.startsWith('partner:')) return getPartner(name) === appFilter.slice(8);
            return name === appFilter;
        }

        function getAppRev(dataObj, appFilter) {
            if (!dataObj) return 0;
            if (appFilter === 'all') return dataObj.total;
            let sum = 0;
            dataObj.apps.forEach(a => { if (isMatchApp(a.name, appFilter)) sum += a.rev; });
            return sum;
        }

        function getAppProfit(dataObj, appFilter) {
            if (!dataObj) return 0;
            let sum = 0;
            dataObj.apps.forEach(a => {
                if (isMatchApp(a.name, appFilter)) {
                    if (a.sheet_data && a.sheet_data.marketing_profit_vnd) {
                        let text = String(a.sheet_data.marketing_profit_vnd);
                        let num = parseFloat(text.replace(/[^0-9.-]/g, ''));
                        if (!isNaN(num)) sum += num * 1000000;
                    }
                }
            });
            // Convert to USD equivalent as formatAmount handles currency dynamically
            return sum / currentVndRate;
        }

        function applyFilter() {
            const timeFilter = document.getElementById('timeFilter').value;
            const appSel = document.getElementById('appFilter').value;
            if (sortedDates.length === 0) return;

            curDates = []; prevDates = []; let lblHero = "Tổng Doanh Thu";

            // Logic Date Range thông minh hơn
            const todayStr = new Date().toISOString().split('T')[0];

            if (timeFilter === 'today') {
                // Nếu ngày mới nhất là hôm nay, lấy nó. Nếu không, coi như chưa có data hôm nay.
                if (sortedDates[0] === todayStr) {
                    curDates = [sortedDates[0]];
                    prevDates = sortedDates.length > 1 ? [sortedDates[1]] : [];
                } else {
                    curDates = []; // Chưa có data hôm nay
                    prevDates = [sortedDates[0]];
                }
                lblHero = "Doanh thu Hôm nay";
            } else if (timeFilter === 'yesterday') {
                // Nếu có data hôm nay, thì hôm qua là index 1. 
                // Nếu chưa có data hôm nay, thì hôm qua chính là index 0 (vì bot thường chạy xong là có data hôm qua ngay).
                if (sortedDates[0] === todayStr) {
                    curDates = sortedDates.length > 1 ? [sortedDates[1]] : [];
                    prevDates = sortedDates.length > 2 ? [sortedDates[2]] : [];
                } else {
                    curDates = [sortedDates[0]];
                    prevDates = sortedDates.length > 1 ? [sortedDates[1]] : [];
                }
                lblHero = "Doanh thu Hôm qua";
            } else if (timeFilter === '7days') {
                curDates = sortedDates.slice(0, 7);
                prevDates = sortedDates.slice(7, 14);
                lblHero = "Tổng 7 Ngày Qua";
            } else if (timeFilter === '30days') {
                curDates = sortedDates.slice(0, 30);
                prevDates = sortedDates.slice(30, 60);
                lblHero = "Tổng 30 Ngày Qua";
            } else if (timeFilter === 'thismonth') {
                const currentMonthPrefix = sortedDates[0].substring(0, 7);
                curDates = sortedDates.filter(d => d.startsWith(currentMonthPrefix));
                prevDates = sortedDates.filter(d => !d.startsWith(currentMonthPrefix)).slice(0, curDates.length);
                lblHero = "Tháng Này (MTD)";
            }

            // Dashboard Metrics Calculation
            let curTotal = 0, prevTotal = 0;
            let curProfitVnd = 0, prevProfitVnd = 0;
            appAgg = {}; profitAgg = {}; prevAppAgg = {}; prevProfitAppAgg = {};

            curDates.forEach(d => {
                const dObj = historyData[d];
                curTotal += getAppRev(dObj, appSel);
                dObj.apps.forEach(a => {
                    if (isMatchApp(a.name, appSel)) {
                        appAgg[a.name] = (appAgg[a.name] || 0) + a.rev;
                        // Gom lãi thực từ sheet_data
                        if (a.sheet_data && a.sheet_data.marketing_profit_vnd) {
                            const pVal = parseFloat(a.sheet_data.marketing_profit_vnd.toString().replace(/,/g, ''));
                            if (!isNaN(pVal)) {
                                profitAgg[a.name] = (profitAgg[a.name] || 0) + pVal;
                                curProfitVnd += pVal;
                            }
                        }
                    }
                });
            });

            prevDates.forEach(d => {
                prevTotal += getAppRev(historyData[d], appSel);
                const dObj = historyData[d];
                if (dObj && dObj.apps) {
                    dObj.apps.forEach(a => {
                        if (isMatchApp(a.name, appSel)) {
                            prevAppAgg[a.name] = (prevAppAgg[a.name] || 0) + a.rev;
                            if (a.sheet_data && a.sheet_data.marketing_profit_vnd) {
                                const pVal = parseFloat(a.sheet_data.marketing_profit_vnd.toString().replace(/,/g, ''));
                                if (!isNaN(pVal)) {
                                    prevProfitVnd += pVal;
                                    prevProfitAppAgg[a.name] = (prevProfitAppAgg[a.name] || 0) + pVal;
                                }
                            }
                        }
                    });
                }
            });

            // 1. Hero Card & Fun Features
            if (curDates.length > 0) {
                let startD = formatVNDate(curDates[curDates.length - 1]);
                let endD = formatVNDate(curDates[0]);
                let rangeStr = startD === endD ? startD : `${startD} đến ${endD}`;
                document.getElementById('heroDateRange').innerText = rangeStr;
                document.getElementById('heroDateRange').style.display = 'block';
            } else {
                document.getElementById('heroDateRange').style.display = 'none';
            }

            // Đổi label thành "Lãi thực"
            const heroLblText = lblHero.replace('Doanh thu', 'Lãi thực').replace('Tổng', 'Lãi thực').replace('Táng', 'Lãi thực');
            const PARTNER_LABELS = { 'partner:azura': 'Azura', 'partner:bbl': 'BBL', 'partner:herond': 'Herond', 'partner:affica': 'Affica' };
            const appSelLabel = PARTNER_LABELS[appSel] || (appSel !== 'all' ? appSel : '');
            document.getElementById('lblHeroRev').innerText = heroLblText + (appSelLabel ? ` (${appSelLabel})` : '');

            // Hiển lãi thực VND (triệu), fallback sang revenue USD nếu chưa có data
            if (curProfitVnd !== 0) {
                document.getElementById('valHeroRev').innerHTML = `<div class="usd">${formatSheetVal(curProfitVnd)}</div>`;
            } else {
                document.getElementById('valHeroRev').innerHTML = `<div class="usd">${formatAmount(curTotal)}</div>`;
            }

            // The Converter Box
            if (curTotal > 0) {
                document.getElementById('converterBox').style.display = 'inline-block';
                document.getElementById('converterBox').innerHTML = `<div class="converter-box">${getFunnyConverterText(curTotal, curProfitVnd !== 0 ? curProfitVnd : null)}</div>`;
            } else {
                document.getElementById('converterBox').style.display = 'none';
            }

            const badgeObj = document.getElementById('trendHeroBadge');
            // Ưu tiên so sánh theo lãi thực, fallback theo revenue
            const trendCur = curProfitVnd !== 0 ? curProfitVnd : curTotal;
            const trendPrev = prevProfitVnd !== 0 ? prevProfitVnd : prevTotal;
            if (trendPrev !== 0) {
                const pct = ((trendCur - trendPrev) / Math.abs(trendPrev)) * 100;
                badgeObj.className = 'trend-badge ' + (pct >= 0 ? 'positive' : 'negative');
                badgeObj.innerText = (pct >= 0 ? '+' : '') + pct.toFixed(1) + (pct >= 0 ? '% ↗' : '% ↘');
                document.getElementById('trendHeroText').innerText = `so với ${prevDates.length} ngày liền trước`;

                // Sarcastic Bot
                document.getElementById('aiJokeBox').style.display = 'flex';
                let quotes = pct >= 0 ? POSITIVE_QUOTES : NEGATIVE_QUOTES;
                document.getElementById('aiJokeText').innerText = quotes[Math.floor(Math.random() * quotes.length)];
            } else {
                badgeObj.className = 'trend-badge neutral';
                badgeObj.innerText = `N/A`;
                document.getElementById('trendHeroText').innerText = `Thiếu dữ liệu`;
                document.getElementById('aiJokeBox').style.display = 'none';
            }

            // 2. Top App Ranking (Top 3)
            // Sort theo lãi thực (profitAgg); nếu app chưa có sheet_data thì đứng sau
            const appArr = Object.entries(appAgg).sort((a, b) => {
                const pa = profitAgg[a[0]] !== undefined ? profitAgg[a[0]] : -Infinity;
                const pb = profitAgg[b[0]] !== undefined ? profitAgg[b[0]] : -Infinity;
                if (pa === -Infinity && pb === -Infinity) return b[1] - a[1]; // cùng chưa có profit thì sort theo rev
                return pb - pa;
            });
            const top3ListContainer = document.getElementById('valTop3List');

            if (appArr.length > 0) {
                let top3Html = '';
                const medals = ['🥇', '🥈', '🥉'];
                const top3 = appArr.slice(0, 3);

                top3.forEach((app, index) => {
                    const appName = app[0];
                    const appRev = app[1];

                    // Tính TỔNG LÃI của app này trong kỳ
                    let totalProfit = 0;
                    let hasSheet = false;
                    curDates.forEach(d => {
                        const dData = historyData[d];
                        if (dData && dData.apps) {
                            const aData = dData.apps.find(a => a.name === appName);
                            if (aData && aData.sheet_data && aData.sheet_data.marketing_profit_vnd) {
                                const pVal = parseFloat(aData.sheet_data.marketing_profit_vnd.toString().replace(/,/g, ''));
                                if (!isNaN(pVal)) {
                                    totalProfit += pVal;
                                    hasSheet = true;
                                }
                            }
                        }
                    });

                    const profitColor = totalProfit < 0 ? 'var(--color-danger)' : '#10b981';
                    const profitText = hasSheet ? `Lãi thực: ${formatSheetVal(totalProfit)}` : 'Lãi thực: --';
                    const trend = getAppTrend(appName);
                    const trendHtml = trend ? `<div style="font-size:0.8rem;font-weight:800;color:${trend.color};margin-top:0.2rem;">${trend.label}</div>` : '';
                    const rankStyle = trend ? `background:${trend.bg};border-color:${trend.border};` : '';

                    const trendPill = trend ? `<span style="font-size:0.72rem;font-weight:800;color:${trend.color};background:${trend.bg};padding:0.15rem 0.5rem;border-radius:999px;">${trend.label}</span>` : '';

                    top3Html += `
                    <div class="ranking-item" style="${rankStyle}" onclick="showAppDetail('${appName}')">
                        <div class="ranking-rank">${medals[index] || (index + 1)}</div>
                        <div class="ranking-info">
                            <div class="ranking-name">${appName}</div>
                            <div class="ranking-stats">
                                ${trendPill}
                                <span style="font-size:1.1rem;color:var(--color-accent);font-weight:800;">${formatAmount(appRev)}</span>
                                <span style="font-size:0.72rem;color:${profitColor};font-weight:700;">${profitText}</span>
                            </div>
                        </div>
                    </div>
                `;
                });
                top3ListContainer.innerHTML = top3Html;
            } else {
                top3ListContainer.innerHTML = '<div style="padding: 2rem 0; text-align: center; color: var(--color-text-muted); opacity: 0.5;">Không có dữ liệu xếp hạng</div>';
            }

            // Render line charts
            let chartDates = curDates;
            if (chartDates.length < 7) {
                chartDates = sortedDates.slice(0, Math.max(7, chartDates.length));
            }

            renderAppListUI(appArr);
            renderCharts(chartDates.reverse(), appArr, appSel);
        }

        function setupFixedMTD(appSel) {
            if (sortedDates.length === 0) return;
            const latestInfo = sortedDates[0].split('-');
            const currentMonthPrefix = `${latestInfo[0]}-${latestInfo[1]}`;

            let monthIterRev = 0;

            for (let d of sortedDates) {
                if (d.startsWith(currentMonthPrefix)) {
                    monthIterRev += getAppRev(historyData[d], appSel);
                }
            }

            document.getElementById('lblMonth').innerText = `Tháng ${latestInfo[1]} (MTD)`;
            document.getElementById('valMonthRev').innerHTML = `<div class="usd">${formatAmount(monthIterRev)}</div>`;

            const daysElapsed = parseInt(latestInfo[2], 10);
            if (daysElapsed > 0) {
                const tempDate = new Date(latestInfo[0], latestInfo[1], 0);
                const daysInMonth = tempDate.getDate();
                const projected = (monthIterRev / daysElapsed) * daysInMonth;
                document.getElementById('valMonthProj').innerText = `Dự kiến: ${formatAmount(projected)}`;
            }
        }

            container.innerHTML = appArr.map((app, i) => {
                const appName = app[0];
                const admobRev = app[1];
                let totalSheetProfit = 0;
                let hasSheetData = false;

                // Tính tổng lãi trong TOÀN BỘ khoảng ngày đang chọn (curDates)
                curDates.forEach(d => {
                    const dayData = historyData[d];
                    if (dayData && dayData.apps) {
                        const appData = dayData.apps.find(a => a.name === appName);
                        if (appData && appData.sheet_data && appData.sheet_data.marketing_profit_vnd) {
                            const prof = parseFloat(appData.sheet_data.marketing_profit_vnd.toString().replace(/,/g, ''));
                            if (!isNaN(prof)) {
                                totalSheetProfit += prof;
                                hasSheetData = true;
                            }
                        }
                    }
                });

                let sheetInfoHtml = '';
                if (hasSheetData) {
                    const pColor = totalSheetProfit < 0 ? 'var(--color-danger)' : '#10b981';
                    sheetInfoHtml = `<div style="font-size:0.78rem;color:${pColor};font-weight:700;margin-top:0.15rem;">Lãi thực: ${formatSheetVal(totalSheetProfit)}</div>`;
                } else {
                    sheetInfoHtml = `<div style="font-size:0.78rem;color:var(--color-text-muted);opacity:0.5;margin-top:0.15rem;">Lãi: --</div>`;
                }

                const trend = getAppTrend(appName);
                const trendPill = trend ? `<span class="app-trend-pill" style="color:${trend.color};background:${trend.bg};">${trend.label}</span>` : '';
                const itemStyle = trend ? `background:${trend.bg};border-color:${trend.border};` : '';

                return `
            <div class="app-item" style="${itemStyle}" onclick="showAppDetail('${appName}')">
                <div class="app-name-wrap">
                    <div class="app-dot" style="background-color:${COLORS[i % COLORS.length]}"></div>
                    <div class="app-name">${appName}</div>
                </div>

                    <div class="app-rev">${formatAmount(admobRev)}</div>
                    ${sheetInfoHtml}
                </div>
                ${trendPill}
            </div>
            `;
            }).join('');
        }

        function renderCharts(orderedDates, appArr, appSel) {

            if (profitLineChartObj) profitLineChartObj.destroy();

            // Line Chart (Doanh Thu)
            lineChartObj = new Chart(document.getElementById('revenueLineChart').getContext('2d'), {
                type: 'line',
                data: {
                    labels: orderedDates.map(d => formatVNDate(d)),
                    datasets: [{
                        label: currentCurrency === 'VND' ? 'Doanh thu (VND)' : 'Doanh thu ($)',
                        data: orderedDates.map(d => getAppRev(historyData[d], appSel)),
                        borderColor: '#3B82F6', backgroundColor: 'rgba(59, 130, 246, 0.12)',
                        borderWidth: 3, tension: 0.4, fill: true,
                        pointBackgroundColor: '#FFFFFF', pointBorderColor: '#3B82F6', pointBorderWidth: 2, pointRadius: 4, pointHoverRadius: 7
                    }]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    layout: { padding: { top: 25, left: 10, right: 15 } },
                    onClick: (e, elements) => {
                        if (elements.length > 0) {
                            const dateStr = orderedDates[elements[0].index];
                            showDetail(dateStr, appSel);
                        }
                    },
                    plugins: {
                        datalabels: {
                            align: 'top',
                            anchor: 'end',
                            color: '#3B82F6',
                            font: { family: "'Inter', sans-serif", weight: 700, size: 10.5 },
                            formatter: function (value) { return formatAmount(value); }
                        },
                        legend: { display: false },
                        tooltip: {
                            displayColors: false, backgroundColor: '#0F172A', titleFont: { family: "'Inter', sans-serif" }, bodyFont: { family: "'Inter', sans-serif", size: 14 }, padding: 12, cornerRadius: 8,
                            callbacks: {
                                label: (ctx) => ` Doanh thu: ${formatAmount(ctx.parsed.y)}`
                            }
                        }
                    },
                    scales: {
                        y: { grid: { color: '#F1F5F9' }, border: { display: false }, ticks: { callback: v => formatAmount(v) } },
                        x: { grid: { display: false }, border: { display: false } }
                    },
                    interaction: { intersect: false, mode: 'index' }
                }
            });

            // Profit Chart
            profitLineChartObj = new Chart(document.getElementById('profitLineChart').getContext('2d'), {
                type: 'bar',
                data: {
                    labels: orderedDates.map(d => formatVNDate(d)),
                    datasets: [{
                        label: currentCurrency === 'VND' ? 'Lãi thực (VND)' : 'Lãi thực ($)',
                        data: orderedDates.map(d => getAppProfit(historyData[d], appSel)),
                        backgroundColor: (ctx) => {
                            const value = ctx.raw || 0;
                            return value < 0 ? 'rgba(239, 68, 68, 0.8)' : 'rgba(16, 185, 129, 0.8)'; // Red if negative, Green if pos
                        },
                        borderRadius: 4,
                        borderWidth: 0,
                    }]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    layout: { padding: { top: 25, left: 10, right: 15 } },
                    onClick: (e, elements) => {
                        if (elements.length > 0) {
                            const dateStr = orderedDates[elements[0].index];
                            showDetail(dateStr, appSel);
                        }
                    },
                    plugins: {
                        datalabels: {
                            align: 'top',
                            anchor: 'end',
                            color: (ctx) => {
                                const value = ctx.dataset.data[ctx.dataIndex];
                                return value < 0 ? '#EF4444' : '#10B981';
                            },
                            font: { family: "'Inter', sans-serif", weight: 700, size: 10.5 },
                            formatter: function (value) { return formatAmount(value); }
                        },
                        legend: { display: false },
                        tooltip: {
                            displayColors: false, backgroundColor: '#0F172A', titleFont: { family: "'Inter', sans-serif" }, bodyFont: { family: "'Inter', sans-serif", size: 14 }, padding: 12, cornerRadius: 8,
                            callbacks: {
                                label: (ctx) => ` Lãi thực: ${formatAmount(ctx.parsed.y)}`
                            }
                        }
                    },
                    scales: {
                        y: { grid: { color: '#F1F5F9' }, border: { display: false }, ticks: { callback: v => formatAmount(v) } },
                        x: { grid: { display: false }, border: { display: false } }
                    },
                    interaction: { intersect: false, mode: 'index' }
                }
            });
        }

        function showDetail(dateStr, appSel) {
            document.getElementById('detailDate').innerText = `Báo cáo Ngày ${formatVNDate(dateStr)}`;
            let apps = historyData[dateStr].apps;

            apps.sort((a, b) => b.rev - a.rev);

            let html = '';
            let totalModal = 0;
            apps.forEach(a => {
                if (isMatchApp(a.name, appSel)) {
                    totalModal += a.rev;
                    html += `<div class="detail-row">
                            <span class="detail-app" style="font-weight: 800; font-size: 1.1rem; color: var(--color-accent);">${a.name}</span>
                            <div style="text-align: right;">
                                <div class="detail-rev" style="font-size: 1.2rem;">${formatAmount(a.rev, false)}</div>
                            </div>
                         </div>`;

                    if (!a.sheet_data || (!a.sheet_data.total_rev_vnd && !a.sheet_data.cost_vnd)) return;

                    const isVnd = currentCurrency === 'VND';
                    const s = a.sheet_data;
                    const sdRevStr = s.total_rev_vnd || '0';
                    const sdCostStr = s.cost_vnd || '0';
                    const sdProfitStr = s.marketing_profit_vnd || '0';
                    const sdPct = s.profit_pct_sheet || '-';

                    // Hàm format tiền: Giá trị file là triệu đồng -> nhân 1.000.000
                    const formatSheetVal = (valStr) => {
                        let num = parseFloat(valStr.toString().replace(/[^0-9.-]/g, ''));
                        if (isNaN(num)) return valStr;
                        if (num === 0) return '<span style="font-weight:400; font-size:0.8rem; color:var(--color-text-muted); opacity:0.7;">Chưa cập nhật</span>';

                        // Chuyển đổi sang đơn vị tiền đồng (đ)
                        let realAmountVnd = num * 1000000;

                        if (isVnd) {
                            return realAmountVnd.toLocaleString('vi-VN') + ' đ';
                        } else {
                            // Quy đổi từ tiền đồng thực tế sang USD
                            let usdVal = realAmountVnd / currentVndRate;
                            return '$' + usdVal.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
                        }
                    };

                    const profitColor = sdProfitStr.toString().includes('-') ? 'var(--color-danger)' : 'var(--color-success)';

                    html += `<div style="background: rgba(59, 130, 246, 0.05); padding: 0.75rem; border-radius: 8px; margin-bottom: 0.8rem; margin-top: -0.4rem; font-size: 0.9rem; border: 1px solid rgba(59, 130, 246, 0.1);">
                        <div style="display:flex; justify-content:space-between; margin-bottom: 0.4rem;">
                            <span style="color:var(--color-text-muted);">Doanh thu tổng (VND)</span>
                            <span style="font-weight:700; color:var(--color-accent);">${formatSheetVal(sdRevStr)}</span>
                        </div>
                        <div style="display:flex; justify-content:space-between; margin-bottom: 0.4rem;">
                            <span style="color:var(--color-text-muted);">Chi phí tổng</span>
                            <span style="font-weight:700; color:var(--color-danger);">${formatSheetVal(sdCostStr)}</span>
                        </div>
                        <div style="display:flex; justify-content:space-between; margin-bottom: 0.4rem; border-top: 1px dashed var(--color-border); padding-top: 0.4rem;">
                            <span style="color:var(--color-text-muted);">Lãi Marketing</span>
                            <span style="font-weight:800; color:${profitColor};">${formatSheetVal(sdProfitStr)}</span>
                        </div>
                        <div style="display:flex; justify-content:space-between;">
                            <span style="color:var(--color-text-muted);">Lãi/Doanh thu</span>
                            <span style="font-weight:800;">${sdPct}${sdPct.toString().includes('%') ? '' : '%'}</span>
                        </div>
                    </div>`;
                }
            });
            html += `<div class="detail-row" style="margin-top: 0.5rem; border-top: 2px dashed var(--color-border); padding-top: 1rem;">
                    <span class="detail-app" style="font-weight: 800;">TỔNG CỘNG</span>
                    <div style="text-align: right;">
                        <div class="detail-rev" style="font-size: 1.4rem; color: var(--color-text);">${formatAmount(totalModal, false)}</div>
                    </div>
                 </div>`;

            document.getElementById('detailList').innerHTML = html;
            document.getElementById('overlay').style.display = 'block';
            document.getElementById('detailPanel').style.display = 'block';
        }

        function showAppDetail(appName) {
            document.getElementById('appFilter').value = appName;
            applyFilter();
            window.scrollTo({ top: 0, behavior: 'smooth' });
            return;

            document.getElementById('detailDate').innerText = `Chi tiết: ${appName}`;

            let html = '';
            let count = 0;

            // Ưu tiên hiện theo thứ tự ngày mới nhất
            const sortedCurDates = [...curDates].sort((a, b) => b.localeCompare(a));

            sortedCurDates.forEach(d => {
                const dayData = historyData[d];
                if (!dayData || !dayData.apps) return;

                const aData = dayData.apps.find(a => a.name === appName);
                if (!aData) return;

                count++;

                html += `<div class="detail-row" style="padding: 1rem 0; border-bottom: 2px solid var(--color-border); flex-direction: column; align-items: flex-start;">
                        <div style="width: 100%; display: flex; justify-content: space-between; align-items: baseline;">
                            <div style="font-size: 0.85rem; color: var(--color-text-muted); font-weight: 700;">${formatVNDate(d)}</div>
                            <div class="detail-rev" style="font-size: 1.35rem; color: var(--color-accent); font-weight: 800;">${formatAmount(aData.rev)}</div>
                        </div>
                        <div style="font-size: 0.9rem; font-weight: 600; color: var(--color-text); margin-top: 0.2rem;">Doanh thu AdMob</div>
                    </div>`;

                if (aData.sheet_data && (aData.sheet_data.marketing_profit_vnd !== undefined)) {
                    const s = aData.sheet_data;
                    const pVal = parseFloat(s.marketing_profit_vnd.toString().replace(/,/g, ''));
                    const pColor = pVal < 0 ? 'var(--color-danger)' : 'var(--color-success)';
                    const pPct = s.profit_pct_sheet || '0%';

                    html += `<div style="background: rgba(59, 130, 246, 0.04); padding: 1rem; border-radius: 12px; margin-top: -0.5rem; margin-bottom: 1.5rem; border: 1px solid rgba(59, 130, 246, 0.1); font-size: 0.9rem;">
                            <div style="display:flex; justify-content:space-between; margin-bottom: 0.4rem; opacity: 0.8;">
                                <span style="color:var(--color-text-muted);">Doanh thu tổng (VND)</span>
                                <span style="font-weight:700; color:var(--color-accent);">${formatSheetValWithTime(s.total_rev_vnd)}</span>
                            </div>
                            <div style="display:flex; justify-content:space-between; margin-bottom: 0.4rem; opacity: 0.8;">
                                <span style="color:var(--color-text-muted);">Chi phí Marketing (VND)</span>
                                <span style="font-weight:700; color:var(--color-danger);">${formatSheetValWithTime(s.cost_vnd)}</span>
                            </div>
                            <div style="display:flex; justify-content:space-between; padding-top: 0.4rem; border-top: 1px dashed rgba(0,0,0,0.05);">
                                <span style="color:var(--color-text-muted); font-weight: 600;">Lãi thực</span>
                                <span style="font-weight:800; color:${pColor};">${formatSheetValWithTime(s.marketing_profit_vnd)} <span style="font-size: 0.75rem; opacity: 0.8;">(${pPct})</span></span>
                            </div>
                        </div>`;
                }
            });

            if (count === 0) {
                html = '<div style="padding: 3rem 0; text-align: center; color: var(--color-text-muted); opacity: 0.6; font-style: italic;">Không tìm thấy dữ liệu ứng dụng này trong kỳ...</div>';
            }

            document.getElementById('detailList').innerHTML = html;
            document.getElementById('overlay').style.display = 'block';
            document.getElementById('detailPanel').style.display = 'block';
        }

        function formatSheetValWithTime(valStr) {
            let num = parseFloat(valStr.toString().replace(/[^0-9.-]/g, ''));
            if (isNaN(num)) return valStr;
            if (num === 0) return '<span style="font-weight:400; font-size:0.8rem; color:var(--color-text-muted); opacity:0.75;">Chưa cập nhật</span>';

            let realVnd = num * 1000000;
            if (currentCurrency === 'VND') {
                return realVnd.toLocaleString('vi-VN') + ' đ';
            } else {
                return '$' + (realVnd / currentVndRate).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
            }
        }

        function closeDetail() {
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('detailPanel').style.display = 'none';
        }

        let selectedCsvBase64 = null;
        function handleFileSelect(event) {
            const file = event.target.files[0];
            if (!file) return;
            const uploadBtn = document.getElementById('uploadBtn');
            const uploadStatus = document.getElementById('uploadStatus');
            uploadStatus.style.display = 'inline-block';
            uploadStatus.innerText = file.name;
            uploadStatus.style.color = "var(--color-text-muted)";

            const reader = new FileReader();
            reader.onload = function (e) {
                const result = e.target.result;
                const base64Str = result.split(',')[1];
                if (base64Str) {
                    selectedCsvBase64 = base64Str;
                    uploadBtn.style.display = 'inline-block';
                }
            };
            reader.readAsDataURL(file);
        }

        async function uploadCsv() {
            if (!selectedCsvBase64) return;
            const btn = document.getElementById('uploadBtn');
            const status = document.getElementById('uploadStatus');
            btn.disabled = true;
            btn.innerText = "⏳ Đang đẩy...";
            status.innerText = "";

            try {
                const protocol = window.location.protocol === 'file:' ? 'http:' : window.location.protocol;
                const host = window.location.hostname === '127.0.0.1' || window.location.hostname === 'localhost' ? 'localhost:3000' : window.location.host;
                const apiUrl = `${protocol}//${host}/api/revenue`;

                const res = await fetch(apiUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ file_content_base64: selectedCsvBase64 })
                });

                const data = await res.json();
                if (data.success) {
                    status.style.color = "var(--color-success)";
                    status.innerText = "✅ Đẩy file thành công! Bạn đợi 3 phút nữa rồi hãy F5 (làm mới) lại web này nhé (Github Action đang gộp file ở Cloud).";
                    btn.style.display = "none";
                } else {
                    status.style.color = "var(--color-danger)";
                    status.innerText = "❌ Lỗi: " + (data.error || "Unknown");
                    btn.innerText = "Thử Lại";
                    btn.disabled = false;
                }
            } catch (err) {
                status.style.color = "var(--color-danger)";
                status.innerText = "❌ Lỗi mạng: " + err.message;
                btn.innerText = "Thử Lại";
                btn.disabled = false;
            }
        }

        init();
    </script>
</body>

</html>
